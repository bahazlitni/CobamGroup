            - heading "AATIK Blanc" [level=2] [ref=e145]
            - paragraph [ref=e146]: AATIK Blanc est un enduit monocouche teinte dans la masse, concu pour l'impermeabilisation et la decoration des facades, murs et supports interieurs ou exterieurs.
            - paragraph [ref=e147]: Il s'applique en neuf sur maconneries non enduites ou beton, et en renovation sur anciens supports non enduits ou revetus d'un mortier hydraulique sain. La finition peut être lissee, rugueuse, brute de projection, ecrasee ou grattee selon le rendu recherche.
            - list [ref=e148]:
              - listitem [ref=e149]:
                - paragraph [ref=e150]: "Conditionnement : sac kraft de 25 kg."
              - listitem [ref=e151]:
                - paragraph [ref=e152]: "Preparation : 6 a 7 litres d'eau par sac de 25 kg pour une application lissee a la taloche."
              - listitem [ref=e153]:
                - paragraph [ref=e154]: "Application : deux passes, dont une premiere couche d'environ 8 mm, sur support propre, stable et prealablement humidifie."
              - listitem [ref=e155]:
                - paragraph [ref=e156]: "Consommation moyenne : 8 a 10 kg/m2 par couche de 8 mm."
              - listitem [ref=e157]:
                - paragraph [ref=e158]: "Temperature de projection recommandee : +5 C a +35 C."
              - listitem [ref=e159]:
                - paragraph [ref=e160]: "Conservation : 12 mois dans l'emballage d'origine, a l'abri de l'humidite."
            - paragraph [ref=e161]: "Reference COBAM : 00244312."
