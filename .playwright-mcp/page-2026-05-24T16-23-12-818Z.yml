            - heading [level=2]: Détails produit
          - generic:
            - generic:
              - generic:
                - heading [level=2]: Joint de carrelage Sika - Antracite
                - paragraph: "Les Carrojoint Sika correspondent a la famille SikaCeram CleanGrout : un mortier de jointoiement premelange a base de ciment, sable de quartz selectionne et additifs specifiques pour joints de 1 a 8 mm. La formulation vise une finition hydrofuge, stable en couleur et adaptee aux carreaux techniques. La teinte Antracite permet d'accorder le joint au carrelage, au format et a l'ambiance du projet. Cette variante SikaCeram CleanGrout est adaptee aux joints techniques de sols et murs, y compris en pieces humides et zones sollicitees."
                - paragraph: Jointoiement de carreaux ceramiques, terre cuite, mosaique de verre, marbre, pierres naturelles et gres. Convient aussi aux pieces humides, piscines, sols chauffants, facades et locaux soumis a de fortes sollicitations.
                - list:
                  - listitem:
                    - paragraph: Classe CG2 WA selon EN 13888, absorption d'eau limitee, haute resistance a l'usure, durete elevee, resistance aux UV et au gel, protection contre moisissures, bacteries et champignons.
                  - listitem:
                    - paragraph: "Conditionnement : sac de 5 kg."
                  - listitem:
                    - paragraph: "Largeur de joint indicative : 1 a 8 mm."
                  - listitem:
                    - paragraph: "Teinte : Antracite. Toujours verifier le rendu sur nuancier et sur un essai chantier avant pose definitive."
                - paragraph: Pour un resultat regulier, respecter les dosages d'eau, le temps de repos, le nettoyage a l'eponge et les delais de mise en service indiques dans la fiche technique de la marque.
