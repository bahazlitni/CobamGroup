          - generic [ref=e1093]:
            - heading "Joint de carrelage Sika - Antracite" [level=2] [ref=e1094]
            - paragraph [ref=e1095]: "Les Carrojoint Sika correspondent a la famille SikaCeram CleanGrout : un mortier de jointoiement premelange a base de ciment, sable de quartz selectionne et additifs specifiques pour joints de 1 a 8 mm. La formulation vise une finition hydrofuge, stable en couleur et adaptee aux carreaux techniques. La teinte Antracite permet d'accorder le joint au carrelage, au format et a l'ambiance du projet. Cette variante SikaCeram CleanGrout est adaptee aux joints techniques de sols et murs, y compris en pieces humides et zones sollicitees."
            - paragraph [ref=e1096]: Jointoiement de carreaux ceramiques, terre cuite, mosaique de verre, marbre, pierres naturelles et gres. Convient aussi aux pieces humides, piscines, sols chauffants, facades et locaux soumis a de fortes sollicitations.
            - list [ref=e1097]:
              - listitem [ref=e1098]:
                - paragraph [ref=e1099]: Classe CG2 WA selon EN 13888, absorption d'eau limitee, haute resistance a l'usure, durete elevee, resistance aux UV et au gel, protection contre moisissures, bacteries et champignons.
              - listitem [ref=e1100]:
                - paragraph [ref=e1101]: "Conditionnement : sac de 5 kg."
              - listitem [ref=e1102]:
                - paragraph [ref=e1103]: "Largeur de joint indicative : 1 a 8 mm."
              - listitem [ref=e1104]:
                - paragraph [ref=e1105]: "Teinte : Antracite. Toujours verifier le rendu sur nuancier et sur un essai chantier avant pose definitive."
            - paragraph [ref=e1106]: Pour un resultat regulier, respecter les dosages d'eau, le temps de repos, le nettoyage a l'eponge et les delais de mise en service indiques dans la fiche technique de la marque.
